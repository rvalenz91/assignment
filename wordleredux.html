<html>
<head>
<title>Wordle Like Game</title>
<style>
h1 { text-align:center; }
#board { text-align:center; max-width:260px; margin:auto; }
.row { display:flex; justify-content:center; margin-bottom:5px; flex-wrap:wrap; }
.cell {
    width:40px; height:40px; line-height:40px;
    border:1px solid black;
    margin:2px; text-align:center;
    font-weight:bold;
    font-size:20px;
    flex:1 1 40px;
}
.green { background:green; color:white; }
.yellow { background:gold; }
.gray { background:#ccc; }

#usedLetters {
    text-align:center;
    margin-top:10px;
    max-width:260px;
    margin-left:auto;
    margin-right:auto;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}
.letterBox {
    display:inline-block;
    width:35px; height:35px;
    line-height:35px;
    border:1px solid black;
    margin:2px;
    font-weight:bold;
    font-size:18px;
    flex:1 1 30px;
    text-align:center;
}
</style>
</head>
<body>

<hr />
<h1>Wordle Like Game</h1>
<hr />

<div id="root"></div>

// react CDN
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<script>
const e = React.createElement;

// DATA
const answer = "moody";
const guesses = ["might", "flood", "stray"];
const ROWS = 6;
const COLS = 5;

// evaluate guess
function evaluateGuess(guess, answer){
    let result = Array(5).fill("gray");
    let answerArr = answer.split("");
    let guessArr = guess.split("");

    // green
    for (let i=0;i<5;i++){
        if (guessArr[i] === answerArr[i]){
            result[i] = "green";
            answerArr[i] = null;
            guessArr[i] = null;
        }
    }

    // yellow
    for (let i=0;i<5;i++){
        if (guessArr[i] && answerArr.includes(guessArr[i])){
            result[i] = "yellow";
            answerArr[answerArr.indexOf(guessArr[i])] = null;
        }
    }

    return result;
}

// build board data
let boardData = [];
for (let r=0; r<ROWS; r++){
    if (r < guesses.length){
        let guess = guesses[r];
        let result = evaluateGuess(guess, answer);
        boardData.push({word: guess, colors: result});
    } else {
        boardData.push({word: "", colors: Array(5).fill("")});
    }
}

// track used letters
let used = {};
guesses.forEach(g => {
    let res = evaluateGuess(g, answer);
    for (let i=0;i<5;i++){
        let letter = g[i].toUpperCase();
        if (!used[letter] || res[i] === "green"){
            used[letter] = res[i];
        }
    }
});

// Board Component
function Board(){
    return e("div", {id:"board"},
        boardData.map((row, r) =>
            e("div", {className:"row", key:r},
                row.word.split("").map((ch, c) =>
                    e("div", {
                        className: "cell " + row.colors[c],
                        key:c
                    }, ch)
                ).concat(
                    row.word.length < 5
                    ? Array(5 - row.word.length).fill(0).map((_,i)=>
                        e("div", {className:"cell", key:"e"+i}, "")
                    )
                    : []
                )
            )
        )
    );
}

// Used Letters Component
function UsedLetters(){
    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

    return e("div", {id:"usedLetters"},
        alphabet.split("").map(l =>
            e("div", {
                className: "letterBox " + (used[l] || ""),
                key:l
            }, l)
        )
    );
}

// App
function App(){
    return e("div", null,
        e(Board),
        e("hr"),
        e(UsedLetters)
    );
}

// render
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(e(App));
</script>

</body>
</html>
